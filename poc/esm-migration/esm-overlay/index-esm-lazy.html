<!doctype html>
<html>
	<head>
		<meta http-equiv="Cache-control" content="no-cache, no-store, must-revalidate" />
		<meta http-equiv="Pragma" content="no-cache" />
		<meta http-equiv="expires" content="0" />

		<meta charset="utf-8" />

		<title>UI5 Application: sample.ts.app (ESM Lazy Mode)</title>

		<!--
			ESM Lazy Mode Test:
			- Boots from standard sap-ui-core.js
			- Injects a shim that adds import()-based module loading to the standard loader
			- Uses esm-bridge-lazy.js which only calls registerESMModule() (no eager imports)
			- When the app requires a converted module, the shim intercepts and uses import()
		-->

		<!-- Step 1: Load standard UI5 loader -->
		<script
			id="sap-ui-bootstrap"
			src="resources/sap-ui-core.js"
			data-sap-ui-resource-roots='{
				"sample.ts.app": "./"
			}'
			data-sap-ui-compat-version="edge"
			data-sap-ui-frame-options="trusted"
			data-sap-ui-async="true"
		></script>

		<!-- Step 2: Inject ESM loading shim into the standard loader -->
		<script>
			(function() {
				// ESM module registry: maps "sap/base/strings/camelize.js" -> "sap/base/strings/camelize-dbg"
				const esmRegistry = new Map();

				// Hook into the loader's module resolution
				const origRequire = sap.ui.require;

				sap.ui.registerESMModule = function(moduleName, esmPath) {
					esmRegistry.set(moduleName + ".js", esmPath || moduleName + "-dbg");
				};

				// Override sap.ui.require to intercept ESM module requests
				// This is a targeted override that only handles the case where ALL
				// requested modules are ESM-registered and uses import() for them.
				sap.ui.require = function(deps, callback, errback) {
					if (!Array.isArray(deps) || !callback) {
						return origRequire.apply(sap.ui, arguments);
					}

					// Check if any deps are ESM modules that haven't been loaded yet
					const esmDeps = [];
					for (const dep of deps) {
						const resourceName = dep + ".js";
						if (esmRegistry.has(resourceName)) {
							esmDeps.push({ dep, path: esmRegistry.get(resourceName) });
						}
					}

					if (esmDeps.length === 0) {
						// No ESM deps — use standard require
						return origRequire.apply(sap.ui, arguments);
					}

					// Pre-load ESM modules via import(), then register them, then call original require
					const imports = esmDeps.map(({ dep, path }) => {
						// Resolve path relative to the page — toUrl returns "resources/..."
						// which import() can't resolve; prepend "./" to make it relative
						const url = "./" + sap.ui.require.toUrl(path) + ".js";
						return import(url).then(mod => {
							const value = mod.default !== undefined ? mod.default : mod;
							// Register into the loader so the standard require path finds it
							sap.ui.predefine(dep, [], function() { return value; });
							// Remove from ESM registry so we don't import again
							esmRegistry.delete(dep + ".js");
						});
					});

					Promise.all(imports).then(() => {
						// Now all ESM modules are registered — delegate to standard require
						origRequire.call(sap.ui, deps, callback, errback);
					}).catch(err => {
						console.error("[ESM Lazy Shim] Failed to load ESM modules:", err);
						if (errback) errback(err);
					});
				};

				// Copy static properties from original require
				Object.keys(origRequire).forEach(key => {
					sap.ui.require[key] = origRequire[key];
				});

				console.log("[ESM Lazy Shim] Installed import()-based module loading shim");
			})();
		</script>

		<!-- Step 3: Register ESM modules lazily -->
		<script type="module">
			import "./resources/esm-bridge-lazy.js";

			// Step 4: Start the app
			sap.ui.require(["sap/ui/core/ComponentSupport"], function(ComponentSupport) {
				ComponentSupport.run();
			});
		</script>
	</head>

	<body class="sapUiBody">
		<div data-sap-ui-component data-name="sample.ts.app"></div>
	</body>
</html>
