<!doctype html>
<html>
	<head>
		<meta http-equiv="Cache-control" content="no-cache, no-store, must-revalidate" />
		<meta http-equiv="Pragma" content="no-cache" />
		<meta http-equiv="expires" content="0" />

		<meta charset="utf-8" />

		<title>UI5 Application: sample.ts.app (ESM Migration)</title>

		<!--
			ESM Migration Strategy:
			1. Load sap-ui-core.js normally (sets up ui5loader + AMD registry)
			2. Load the ESM-AMD bridge as a module script (imports ESM modules,
			   registers them into the ui5loader registry via sap.ui.predefine)
			3. The bridge overrides the AMD versions of converted modules with
			   their ESM equivalents before the app starts

			The bridge must load AFTER sap-ui-core.js but BEFORE the app initializes.
			We remove data-sap-ui-on-init from the bootstrap and manually trigger
			component loading after the bridge is ready.
		-->

		<!-- Step 1: Load UI5 core (ui5loader + AMD modules) -->
		<script
			id="sap-ui-bootstrap"
			src="resources/sap-ui-core.js"
			data-sap-ui-resource-roots='{
				"sample.ts.app": "./"
			}'
			data-sap-ui-compat-version="edge"
			data-sap-ui-frame-options="trusted"
			data-sap-ui-async="true"
		></script>

		<!-- Step 2: Load ESM-AMD bridge (registers ESM modules into ui5loader) -->
		<script type="module">
			import "./resources/esm-bridge.js";

			// Step 3: Now that ESM modules are registered, start the app
			sap.ui.require(["sap/ui/core/ComponentSupport"], function(ComponentSupport) {
				ComponentSupport.run();
			});
		</script>
	</head>

	<body class="sapUiBody">
		<div data-sap-ui-component data-name="sample.ts.app"></div>
	</body>
</html>
