<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>UI5 Bun Library Workspace App</title>
	<style>
		:root {
			font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
			color: #1f2933;
			background: radial-gradient(circle at top, #fef3c7 0%, #dbeafe 60%, #e5e7eb 100%);
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
		}

		section {
			max-width: 44rem;
			margin: 2rem;
			padding: 2rem;
			background: rgba(255, 255, 255, 0.88);
			border: 1px solid rgba(31, 41, 51, 0.08);
			border-radius: 1.25rem;
			box-shadow: 0 20px 48px rgba(31, 41, 51, 0.14);
		}

		h1 {
			margin-top: 0;
			font-size: clamp(2rem, 4vw, 3rem);
		}
	</style>
</head>
<body>
	<section>
		<h1>Workspace app using a local library</h1>
		<p>This example serves an application and resolves a sibling library through <code>ui5-workspace.yaml</code>.</p>
		<p>Fetched library asset: <strong data-library>loading...</strong></p>
	</section>
	<script src="./main.js"></script>
</body>
</html>
